<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B9%3C/text%3E%3C/svg%3E"
    />
    <title>Leitmotif — MIDI Trainer</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // If the app fails to boot (old WebView, missing API), show the error
      // instead of a silent black page
      (function () {
        function show(msg) {
          var root = document.getElementById('root');
          if (root && !root.hasChildNodes()) {
            root.innerHTML =
              '<pre style="color:#f87171;background:#111;padding:16px;margin:0;white-space:pre-wrap;font-size:12px;font-family:monospace">App failed to start:\n\n' +
              msg +
              '</pre>';
          }
        }
        window.addEventListener('error', function (e) {
          show(e.message || String(e.error || 'unknown error'));
        });
        window.addEventListener('unhandledrejection', function (e) {
          show(String((e.reason && e.reason.message) || e.reason || 'unhandled rejection'));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
